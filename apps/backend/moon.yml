# yaml-language-server: $schema=https://moonrepo.dev/schemas/project.json
layer: 'application'
language: 'go'

tasks:
  # Hot reload via air. Install once: go install github.com/air-verse/air@latest
  dev:
    command: 'air'
    preset: 'server'
    options:
      cache: false
  build:
    command: 'go build -o bin/api ./cmd/api'
    inputs: ['**/*.go', 'go.mod', 'go.sum']
    outputs: ['bin/api']
  test:
    command: 'go test ./... -race -cover'
    inputs: ['**/*.go']
  # go vet — quick static check used by CI's `:check`.
  check:
    command: 'go vet ./...'
    inputs: ['**/*.go']
  # Full lint. Install: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
  lint:
    command: 'golangci-lint run ./...'
    inputs: ['**/*.go', '.golangci.yml']
