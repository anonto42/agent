version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/levelaxis/charli
    gofmt:
      simplify: true

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
  # golangci-lint v2 moved exclusions under linters.exclusions.
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
