root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/api"
  bin = "./tmp/main"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "testdata", "bin"]
  include_ext = ["go", "tmpl", "html"]
  exclude_regex = ["_test.go"]
  stop_on_error = false

[log]
  main_only = false
  time = false
