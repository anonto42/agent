# yaml-language-server: $schema=https://moonrepo.dev/schemas/project.json
layer: 'application'
language: 'typescript'

tasks:
  dev:
    command: 'pnpm exec wxt'
    preset: 'server'
    options:
      cache: false
  build:
    command: 'pnpm exec wxt build'
    inputs:
      ['entrypoints/**/*', 'features/**/*', 'shared/**/*', 'entities/**/*', 'wxt.config.ts', 'package.json']
    outputs: ['.output']
  check:
    command: 'pnpm exec tsc --noEmit'
    inputs: ['entrypoints/**/*', 'features/**/*', 'shared/**/*', 'entities/**/*', 'tsconfig.json']
  test:
    command: 'pnpm exec vitest run'
    inputs:
      ['features/**/*', 'shared/**/*', 'entities/**/*', 'vitest.config.ts', 'vitest.setup.ts']
