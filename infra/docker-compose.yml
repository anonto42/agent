# Local dev dependencies for the backend.
# Run:  docker compose -f infra/docker-compose.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: charli
      POSTGRES_PASSWORD: charli
      POSTGRES_DB: charli
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  pgdata:
